# 통합 배포: repo 루트(campusdrop_backend)에서 실행
# cp .env.example .env 후 값 수정 → docker compose up -d --build

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-campusdrop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # 호스트(EC2)에서만 접속: Prisma Studio·psql·GUI 툴이 db 호스트명 없이 127.0.0.1 로 붙게 함
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  matching:
    build:
      context: .
      dockerfile: campusdrop_matching/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # DATABASE_URL: only from env_file (avoid compose ${} mangling passwords with $ or #).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MATCHING_SERVICE_URL: ${MATCHING_SERVICE_URL:-http://matching:8000}
    # 학교 증빙 등 `campusdrop_server/uploads/*` — 볼륨 없으면 재배포·재빌드 시 파일 유실 → GET .../school-proofs/:id/file 404
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "${SERVER_PUBLISH_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      matching:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  server_uploads:
