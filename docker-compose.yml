# 통합 배포: 레포 루트(campusdrop_backend)에서 실행
#   cp .env.example .env 후 값 수정
#
# EC2/프로덕 갱신(권장 한 줄):  
#   git pull origin main && docker compose up -d --build server
# server 이미지는 campusdrop_server(Prisma migrations 포함)를 다시 복사하고,
# 컨테이너 기동 시 entrypoint가 npx prisma migrate deploy 후 node를 띄움(RDS면 .env의 DATABASE_URL).
#
# Python 매칭 API(`matching`)는 기본 스택에서 빠짐. 필요 시:
#   docker compose --profile matching up -d
# 매칭 없이 두면 /api/match·배치 등 Python 호출은 실패할 수 있음.

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-campusdrop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # 호스트(EC2)에서만 접속: Prisma Studio·psql·GUI 툴이 db 호스트명 없이 127.0.0.1 로 붙게 함
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    # 호스트에서 Node(npm run dev)로 API만 띄울 때: REDIS_URL=redis://127.0.0.1:6379
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  matching:
    profiles:
      - matching
    build:
      context: .
      dockerfile: campusdrop_matching/Dockerfile
    restart: unless-stopped
    # 배치 매칭은 유저 수에 따라 CPU·메모리 사용이 커진다. OOM 시 프로세스가 죙여 Node 쪽에서는 ECONNRESET·socket hang up 로 보임.
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # DATABASE_URL: only from env_file (avoid compose ${} mangling passwords with $ or #).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MATCHING_SERVICE_URL: ${MATCHING_SERVICE_URL:-http://matching:8000}
    # 학교 증빙 등 `campusdrop_server/uploads/*` — 볼륨 없으면 재배포·재빌드 시 파일 유실 → GET .../school-proofs/:id/file 404
    volumes:
      - server_uploads:/app/uploads
    ports:
      - "${SERVER_PUBLISH_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  server_uploads:
